name: SolidInvoice
description:
  SolidInvoice is a self-hosted invoicing and billing platform built with
  Symfony and Vue.js. Create and send professional invoices and quotes, track
  payments, manage clients and contacts, and accept online payments through
  multiple payment gateways. It ships as a single container with an embedded
  FrankenPHP server and uses MySQL for data storage.
instructions:
  After deployment, navigate to your domain — you will be automatically
  redirected to the installation wizard at /install. Follow the steps to
  configure the database connection (MySQL details are pre-filled via
  environment variables), set your application URL, locale, and create the
  initial admin account. Once the wizard completes you will be logged in and
  ready to create your first invoice.
changeLog:
  - date: 2026-06-18
    description: Initial release
