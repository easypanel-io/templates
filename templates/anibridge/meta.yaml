name: AniBridge
description:
  AniBridge is a media synchronization tool that keeps your anime watch activity
  perfectly in sync across library providers (Plex, Jellyfin, Emby) and list
  trackers (AniList, MyAnimeList). It includes a web dashboard with a real-time
  sync timeline, profile manager, custom mapping editor, log viewer, and
  automatic list backups — all powered by a database of over 250,000 anime
  mappings.
instructions:
  After deploying, open the web UI on port 4848 and configure your providers and
  profiles through the Settings page. On first boot with no config file, the web
  UI is accessible without a password so you can complete the initial setup. Add
  web.basic_auth.username and web.basic_auth.password in the config file (or via
  AB_WEB__BASIC_AUTH__USERNAME / AB_WEB__BASIC_AUTH__PASSWORD env vars) to
  secure the dashboard once configured.
