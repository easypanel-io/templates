benefits:
  - title: Unified Anime Sync
    description:
      Automatically synchronizes watch status, progress, ratings, reviews, and
      start/completion dates between your media server and any supported list
      tracker — no manual updates needed.
  - title: Smart Content Matching
    description:
      Uses a curated database of over 250,000 anime entries with fuzzy title
      search fallback and support for custom mapping overrides, so even obscure
      titles are matched correctly.
  - title: Multi-User & Multi-Profile
    description:
      Define independent profiles for different users, libraries, and servers.
      Each profile has its own sync rules, intervals, and provider configuration
      running in parallel.
  - title: Safe & Reversible
    description:
      Dry-run mode lets you preview every change before it is applied. Automatic
      list backups with a configurable retention period let you restore previous
      states directly from the web UI.
features:
  - title: Web Dashboard
    description:
      Intuitive UI with a real-time sync timeline, profile management, custom
      mapping editor, and a live log viewer — accessible from any browser.
  - title: Flexible Scan Modes
    description:
      Three scan modes — periodic full scans, incremental polling, and
      webhook-triggered syncs — can be enabled simultaneously per profile.
  - title: Provider Plugin System
    description:
      Modular architecture supports Plex, Jellyfin, Emby as library sources and
      AniList and MyAnimeList as list targets, with more providers planned.
  - title: Declarative Sync Rules
    description:
      Fine-grained YAML-based rules let you disable specific fields (status,
      progress, rating, reviews, dates) or apply conditional overrides per
      profile.
  - title: Automatic Backups
    description:
      List state is backed up before every sync run. Backups are retained for a
      configurable number of days and can be restored with one click in the UI.
tags:
  - Media
  - Anime
  - Synchronization
  - Self-Hosted
