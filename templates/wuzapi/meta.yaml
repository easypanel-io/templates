name: WuzAPI
description:
  WuzAPI is a RESTful API service for WhatsApp built on top of the whatsmeow
  library. It communicates directly with WhatsApp WebSocket servers without
  using Puppeteer or Android emulators, making it significantly faster and
  much less demanding on memory and CPU. WuzAPI supports multiple device
  connections with concurrent sessions, allowing you to manage several
  WhatsApp accounts simultaneously. It provides endpoints for sending text,
  image, audio, document, video, sticker, location, contact, and poll
  messages. You can manage sessions, users, chats, groups, and webhooks
  through a clean REST API. It includes webhook HMAC signing for secure
  integrations, encrypted credential storage with AES-256, and optional
  RabbitMQ support for event queuing. WuzAPI uses PostgreSQL for persistent
  data storage and includes a built-in web dashboard for session management
  and QR code scanning.
instructions:
  After deployment, access the dashboard at https://your-domain/dashboard to
  manage sessions. Use the admin token to create users via the API. Scan QR
  codes at https://your-domain/login to connect WhatsApp devices. The
  encryption key must be exactly 32 characters for AES-256. RabbitMQ is
  optional and can be removed if not needed.
changeLog:
  - date: 2026-03-21
    description: First release
links:
  - label: Website
    url: https://github.com/asternic/wuzapi
  - label: Documentation
    url: https://github.com/asternic/wuzapi/blob/main/API.md
  - label: Github
    url: https://github.com/asternic/wuzapi
contributors:
  - name: SrAnuncio
    url: https://github.com/SrAnuncio
schema:
  type: object
  required:
    - appServiceName
    - appServiceImage
    - databaseServiceName
    - rabbitmqServiceName
  properties:
    appServiceName:
      type: string
      title: App Service Name
      default: wuzapi
    appServiceImage:
      type: string
      title: App Service Image
      default: asternic/wuzapi:latest
    databaseServiceName:
      type: string
      title: Database Service Name
      default: wuzapi-db
    rabbitmqServiceName:
      type: string
      title: RabbitMQ Service Name
      default: wuzapi-rabbitmq
    rabbitmqServiceImage:
      type: string
      title: RabbitMQ Service Image
      default: rabbitmq:3-management-alpine
benefits:
  - title: Lightweight and Fast
    description:
      WuzAPI communicates directly with WhatsApp WebSocket servers without
      using Puppeteer or Android emulators, making it significantly faster
      and much less demanding on memory and CPU than alternative solutions.
  - title: Multiple Device Support
    description:
      Manage multiple WhatsApp accounts simultaneously with concurrent
      sessions. Each session operates independently, allowing you to scale
      your WhatsApp integrations as needed.
  - title: Secure by Design
    description:
      WuzAPI includes AES-256 encryption for stored credentials, HMAC
      webhook signing for secure integrations, and admin token authentication
      for API access control.
  - title: Self-Hosted
    description:
      Keep full control of your data by self-hosting WuzAPI. All WhatsApp
      session data and messages stay on your own infrastructure.
features:
  - title: Complete REST API
    description:
      Send text, image, audio, document, video, sticker, location, contact,
      and poll messages through a clean REST API. Manage sessions, users,
      chats, groups, and webhooks programmatically.
  - title: Webhook Support
    description:
      Configure webhooks to receive real-time notifications for incoming
      messages and events. Includes HMAC signature verification for secure
      webhook integrations.
  - title: Built-in Dashboard
    description:
      A web-based dashboard for managing WhatsApp sessions, scanning QR
      codes, and monitoring connection status without writing any code.
  - title: Event Queue with RabbitMQ
    description:
      Optional RabbitMQ integration for reliable event queuing, ensuring no
      messages are lost even during high traffic or temporary outages.
  - title: Group Management
    description:
      Create, delete, and manage WhatsApp groups. Get group info, invite
      links, manage participants, and update group photos and names.
  - title: PostgreSQL Storage
    description:
      Uses PostgreSQL for reliable persistent data storage, supporting
      concurrent access and ensuring data integrity across multiple sessions.
tags:
  - Communication
  - Messaging
  - API
