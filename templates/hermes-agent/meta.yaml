name: Hermes Agent
description: |
  Hermes Agent is an autonomous AI agent by Nous Research that runs persistently on your server, remembers what it learns, executes shell commands, manages files, browses the web, schedules cron tasks, and integrates with Telegram, Discord, Slack, and WhatsApp. It supports 200+ models through OpenRouter and direct integrations with Anthropic, OpenAI, Google, and DeepSeek. All sessions, memory, skills, and configuration are stored in a persistent volume so the agent grows more capable over time.
instructions: |
  Access the Hermes TUI via SSH: run "docker exec -it <container_name> hermes setup" for first-time API key configuration, then "docker exec -it <container_name> hermes" to open the interactive chat. To find the container name, run "docker ps" on your server. To enable the messaging gateway (Telegram/Discord/Slack), first run "docker exec -it <container_name> hermes gateway setup", then update the service start command to "gateway run" in Easypanel and redeploy.
changeLog:
  - date: "2025-04-16"
    description: Initial release
links:
  - label: Website
    url: https://hermes-agent.nousresearch.com/
  - label: Documentation
    url: https://hermes-agent.nousresearch.com/docs
  - label: Github
    url: https://github.com/NousResearch/hermes-agent
contributors:
  - name: Community
    url: https://github.com/NousResearch/hermes-agent/graphs/contributors
schema:
  type: object
  required:
    - appServiceName
    - appServiceImage
  properties:
    appServiceName:
      type: string
      title: App Service Name
      default: hermes-agent
    appServiceImage:
      type: string
      title: App Service Image
      default: nousresearch/hermes-agent:latest
    anthropicApiKey:
      type: string
      title: Anthropic API Key
      description: "Optional: injected as ANTHROPIC_API_KEY. Can also be set later via hermes setup."
    openaiApiKey:
      type: string
      title: OpenAI API Key
      description: "Optional: injected as OPENAI_API_KEY. Can also be set later via hermes setup."
benefits:
  - title: Persistent Memory & Skills
    description: The agent remembers your conversations, builds skills from experience, and retains context across sessions — all stored in a persistent volume on your own server.
  - title: Multi-Provider Model Support
    description: Works with 200+ models via OpenRouter plus direct integrations with Anthropic, OpenAI, Google, DeepSeek, and more. Switch models at any time with hermes model.
  - title: Messaging Gateway
    description: Connect the agent to Telegram, Discord, Slack, or WhatsApp so it responds to messages, runs scheduled tasks, and delivers results to your phone.
  - title: Self-Hosted & Private
    description: All conversations, memory, API keys, and files stay on your own infrastructure. Nothing is sent to third-party services beyond your chosen LLM provider.
features:
  - title: Autonomous Tool Use
    description: Built-in tools for shell execution, file operations, web search, and code running — the agent decides which tools to use and chains them together to complete tasks.
  - title: Cron Scheduling
    description: Schedule recurring tasks with natural-language prompts and have results delivered to your messaging platform of choice.
  - title: Skills System
    description: Install community skills from agentskills.io or write your own. Skills extend the agent with new capabilities and are persisted in the data volume.
  - title: MCP Server Support
    description: Connect any MCP-compatible server for additional tool integrations, or expose Hermes itself as an MCP server to Claude Code, Cursor, or other editors.
tags:
  - AI
  - Automation
  - Self-Hosted
  - Developer Tools
  - Productivity
