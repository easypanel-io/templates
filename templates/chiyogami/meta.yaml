name: Chiyogami
description:
  Chiyogami is a sleek, modern, self-hosted pastebin written in Go. It supports
  client-side encryption via the WebCrypto API so passwords never reach the
  server, configurable paste expiry, public and private paste visibility, syntax
  highlighting via HighlightJS, Markdown rendering, user accounts and
  authentication, a REST API for scripted access, QR code sharing, built-in rate
  limiting, and a search and list view of public pastes. It uses SQLite for
  storage, making it lightweight and easy to deploy with a single container and
  one volume.
instructions:
  After deployment open the web UI at your configured domain. Anonymous paste
  creation works immediately without an account. To create an account click the
  Sign Up button and register — there are no default admin credentials.
changeLog:
  - date: 2026-07-01
    description: first release
