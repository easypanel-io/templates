      default: ghcr.io/rhee876527/chiyogami:1.5.5
benefits:
  - title: Client-Side Encryption
    description:
      Paste content is encrypted in the browser with a user-supplied password
      before it is sent to the server. The server never sees the plaintext or
      the key.
  - title: Lightweight and Self-Contained
    description:
      A single Go binary backed by SQLite — no PostgreSQL, no Redis, no external
      services. One container and one volume is all you need.
  - title: Full User Account System
    description:
      Register accounts to manage your own pastes, set expiry, control
      visibility, and browse your paste history from the web UI.
features:
  - title: Syntax Highlighting
    description:
      Paste code in any language and get automatic syntax highlighting powered
      by HighlightJS with language auto-detection.
  - title: Markdown Rendering
    description:
      Write pastes in Markdown and view them rendered directly in the browser
      without a separate preview step.
  - title: REST API
    description:
      Create, read, and delete pastes programmatically via a JSON API suitable
      for scripts, CLI tools, and CI pipelines.
  - title: QR Code Sharing
    description:
      Every paste page includes a QR code for quick sharing with phones or
      tablets without copying the URL.
  - title: Configurable Rate Limiting
    description:
      Built-in rate limiting on create, register, login, and delete operations
      protects public instances from abuse.
tags:
  - Pastebin
  - Productivity
  - Self-Hosted
