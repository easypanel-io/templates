name: Backrest
description:
  Backrest is a web UI and orchestrator for restic backups. It supports
  scheduling, browsing snapshots, restores, notifications, and any restic-backed
  storage (S3, B2, rclone remotes, local, etc.). This template keeps the
  standard data/config/cache/tmp/rclone volumes and optionally bind-mounts host
  paths at /userdata and /repos like the upstream Docker Compose examples.

instructions: |
  Port; Backrest's default listen port is 9898 in bare Docker/docs; this
  template uses 8080 so Easypanel's domain mapping matches the process
  (BACKREST_PORT=0.0.0.0:8080). To use 9898 instead, change both the app domain
  port and BACKREST_PORT in the service env to stay in sync. Backup sources; Use
  template fields Host path → /userdata and/or Host path → /repos for directories
  you want visible inside the container (same as path/to/backup/data:/userdata
  and path/to/local/repos:/repos in the official compose). You can also add more
  bind mounts in Easypanel for other paths, then reference them in backup plans
  inside Backrest. First run; Open the UI, complete setup (credentials), and
  configure repos and schedules per the documentation.

changeLog:
  - date: 2025-09-29
    description: First release
  - date: 2026-02-09
    description:
      Website/docs links, instructions (port 8080 vs 9898, bind mounts),
      optional /userdata & /repos, TZ default Etc/UTC

