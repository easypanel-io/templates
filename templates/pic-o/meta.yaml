name: Pic-O
description:
  Pic-O is a modern self-hosted photo gallery application with a clean web
  interface for browsing and organizing image collections. This template deploys
  Pic-O with a MariaDB backend and preconfigured application settings so the app
  and database communicate correctly at first startup.

instructions:
  Deploy the template and wait until both services are healthy, then open the
  configured domain to access the Pic-O interface and complete initial setup in
  the web UI.

changeLog:
  - date: "2026-04-01"
    description: "Initial template release"

links:
  - label: Documentation
    url: https://github.com/Xirt/Pic-O#readme
  - label: GitHub
    url: https://github.com/Xirt/Pic-O

contributors:
  - name: Ahson Shaikh
    url: https://github.com/Ahson-Shaikh

schema:
  type: object
  required:
    - appServiceName
    - appServiceImage
  properties:
    appServiceName:
      type: string
      title: App Service Name
      default: app
    appServiceImage:
      type: string
      title: App Service Image
      default: xirtnl/pic-o:latest

benefits:
  - title: Simple Photo Stack
    description:
      Run Pic-O with a straightforward app plus database architecture.
  - title: Persistent Media Storage
    description:
      Store photos and application data in mounted volumes for long term use.
  - title: Self-Hosted Control
    description: Keep your image data and metadata in your own infrastructure.

features:
  - title: MariaDB Backed
    description:
      Uses MariaDB for durable application metadata and configuration state.
  - title: Dedicated Photo Mount
    description: Maps a persistent storage path to /var/www/resources/photos.
  - title: Dedicated App Storage Mount
    description: Maps a persistent path to /var/www/storage/app.

tags:
  - Photos
  - Gallery
  - MariaDB
  - Self-Hosted
