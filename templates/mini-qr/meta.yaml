name: MiniQR
description:
  MiniQR is a lightweight, self-hostable QR code generator built with Vue 3
  and Vite. It lets you create fully customised QR codes — changing dot shapes,
  colours, corner styles, embedded logos, and decorative frames — and export
  them as PNG or SVG. Presets, batch export, and a clean single-page interface
  make it practical for both personal and branded use.
instructions: |
  After deployment, open your service URL. No login is required. Enter any URL
  or text in the "Data to encode" field to generate a QR code. Use the
  customisation panel on the right to adjust colours, dot styles, and frame
  settings. Download the result as PNG or SVG.

  Note: all VITE_* configuration variables (default presets, branding, etc.)
  are baked into the pre-built image at build time and cannot be changed at
  runtime. To use custom presets or hide credits, build your own image from
  the source repository and pass the desired build arguments.
changeLog:
  - date: 2026-06-23
    description: Initial release (v0.31.0)
links:
  - label: Website
    url: https://mini-qr-code-generator.vercel.app
  - label: GitHub
    url: https://github.com/lyqht/mini-qr
  - label: Documentation
    url: https://github.com/lyqht/mini-qr/blob/main/SELF_HOSTING.md
contributors:
