schema:
  type: object
  required:
    - appServiceName
    - appServiceImage
  properties:
    appServiceName:
      type: string
      title: App Service Name
      default: mini-qr
    appServiceImage:
      type: string
      title: App Service Image
      default: ghcr.io/lyqht/mini-qr:v0.31.0
benefits:
  - title: No Account or Backend Required
    description:
      Fully static single-page app — deploy once and generate QR codes
      instantly with no server-side processing or user accounts.
  - title: Full Visual Customisation
    description:
      Control every pixel of your QR code — dot shapes, corner styles, colours,
      embedded logos, and decorative text frames.
  - title: Export as PNG or SVG
    description:
      Download QR codes in high-resolution PNG or scalable SVG format, ready
      for print, web, or presentation use.
features:
  - title: QR Code Generator
    description:
      Encode URLs, plain text, Wi-Fi credentials, contact cards, or any other
      data into a scannable QR code in seconds.
  - title: Style Presets
    description:
      Save and reload named style configurations so you can apply consistent
      branding across multiple QR codes quickly.
  - title: Batch Export
    description:
      Generate and download multiple QR codes at once from a CSV data source,
      each using the same visual style.
  - title: Frame Designer
    description:
      Add a decorative frame around the QR code with custom text, colours,
      border radius, and padding for print-ready output.
  - title: Internationalisation
    description:
      Interface available in multiple languages via Vue i18n with community
      translations managed through Crowdin.
tags:
  - QR Code
  - Generator
  - Utilities
  - Self-hosted
  - Productivity
