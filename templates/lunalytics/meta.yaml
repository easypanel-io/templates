name: Lunalytics
description:
  Lunalytics is a self-hosted uptime monitoring and status page platform. Monitor
  HTTP, TCP, DNS, and ping endpoints with configurable check intervals, get
  notified via Discord, Slack, email, and more, and share a public status page
  with your users. It stores all data locally using SQLite and runs entirely
  within a single container.
instructions:
  After deployment, navigate to your domain and complete the setup wizard. You
  will be asked to create an owner account (email, username, password), choose a
  database name, enter the public website URL (must start with https://), and set
  a data retention period (default 6 months). Once setup is complete you will be
  redirected to the dashboard where you can add your first monitor.
changeLog:
  - date: 2026-06-18
    description: Initial release
links:
  - label: Website
    url: https://lunalytics.xyz
  - label: GitHub
    url: https://github.com/KSJaay/Lunalytics
