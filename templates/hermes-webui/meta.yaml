name: Hermes Agent
description: |
  Hermes Agent is an autonomous AI agent by Nous Research that runs persistently on your server, remembers what it learns, executes shell commands, manages files, browses the web, schedules cron tasks, and integrates with Telegram, Discord, Slack, and WhatsApp. It supports over 200 models through OpenRouter and direct integrations with Anthropic, OpenAI, Google, and DeepSeek. All sessions, memory, skills, and configuration are stored in a persistent volume so the agent grows more capable over time.
instructions: |
  Access the Hermes TUI by opening a terminal into the container from the Easypanel dashboard (Service → Terminal) and running: hermes setup (first-time only, to configure your API keys and model), then hermes to start chatting. To run the messaging gateway for Telegram/Discord/Slack, first run hermes gateway setup, then change the service start command to: hermes gateway run
changeLog:
  - date: "2025-04-16"
    description: Initial release
links:
  - label: Website
    url: https://hermes-agent.nousresearch.com/
  - label: Documentation
    url: https://hermes-agent.nousresearch.com/docs
  - label: Github
    url: https://github.com/NousResearch/hermes-agent
contributors:
  - name: Community
    url: https://github.com/NousResearch/hermes-agent/graphs/contributors
schema:
  type: object
  required:
    - appServiceName
    - appServiceImage
  properties:
    appServiceName:
      type: string
      title: App Service Name
      default: hermes-agent
    appServiceImage:
      type: string
      title: App Service Image
      default: nousresearch/hermes-agent:latest
    anthropicApiKey:
      type: string
      title: Anthropic API Key
      description: "Optional: your Anthropic API key (sk-ant-...). Can also be configured later via hermes setup inside the container."
    openaiApiKey:
      type: string
      title: OpenAI API Key
      description: "Optional: your OpenAI API key (sk-...). Can also be configured later via hermes setup inside the container."
benefits:
  - title: Persistent Memory & Skills
    description: The agent remembers your conversations, builds skills from experience, and retains context across sessions — all stored in a persistent volume on your own server.
  - title: Multi-Provider Model Support
    description: Works with over 200 models via OpenRouter plus direct integrations with Anthropic, OpenAI, Google, DeepSeek, and more. Switch models at any time with hermes model.
  - title: Messaging Gateway
    description: Connect the agent to Telegram, Discord, Slack, or WhatsApp so it responds to messages, runs scheduled tasks, and delivers results to your phone.
  - title: Self-Hosted & Private
    description: All conversations, memory, API keys, and files stay on your own infrastructure. Nothing is sent to third-party services beyond your chosen LLM provider.
features:
  - title: Autonomous Tool Use
    description: Built-in tools for shell execution, file operations, web search, and code running — the agent decides which tools to use and chains them together to complete tasks.
  - title: Cron Scheduling
    description: Schedule recurring tasks with natural-language prompts and have results delivered to your messaging platform of choice.
  - title: Skills System
    description: Install community skills from agentskills.io or write your own. Skills extend the agent with new capabilities and are persisted in the data volume.
  - title: MCP Server Support
    description: Connect any MCP-compatible server for additional tool integrations, or expose Hermes itself as an MCP server to Claude Code, Cursor, or other editors.
tags:
  - AI
  - Automation
  - Self-Hosted
  - Developer Tools
  - Productivity
