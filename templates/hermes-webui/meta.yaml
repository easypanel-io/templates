name: Hermes WebUI
description: |
  Hermes WebUI is a lightweight, dark-themed browser interface for Hermes Agent — an autonomous AI agent by Nous Research that remembers what it learns, executes shell commands, manages files, schedules cron tasks, and integrates with Telegram, Discord, and Slack. This template deploys both the Hermes Agent (gateway mode) and the Hermes WebUI as two services sharing a common state volume, giving you full CLI parity from any browser with password-protected access.
instructions: |
  Run the Hermes setup wizard on first boot to configure your API keys: exec into the hermes-agent container and run "hermes setup", or set ANTHROPIC_API_KEY / OPENAI_API_KEY directly in the agent service environment. The WebUI takes 1–2 minutes on first start while it installs the agent Python package.
changeLog:
  - date: "2025-04-16"
    description: Initial release
links:
  - label: Website
    url: https://hermes-agent.nousresearch.com/
  - label: Documentation
    url: https://hermes-agent.nousresearch.com/docs
  - label: Github
    url: https://github.com/nesquena/hermes-webui
contributors:
  - name: Community
    url: https://github.com/nesquena/hermes-webui/graphs/contributors
schema:
  type: object
  required:
    - agentServiceName
    - agentServiceImage
    - webuiServiceName
    - webuiServiceImage
  properties:
    agentServiceName:
      type: string
      title: Agent Service Name
      default: hermes-agent
    agentServiceImage:
      type: string
      title: Agent Image
      default: nousresearch/hermes-agent:latest
    webuiServiceName:
      type: string
      title: WebUI Service Name
      default: hermes-webui
    webuiServiceImage:
      type: string
      title: WebUI Image
      default: ghcr.io/nesquena/hermes-webui:latest
    webuiPassword:
      type: string
      title: WebUI Password
      description: Password to protect the browser UI. Auto-generated if left blank.
    defaultModel:
      type: string
      title: Default AI Model
      oneOf:
        - enum:
            - openai/gpt-4o-mini
          title: GPT-4o Mini (OpenAI)
        - enum:
            - openai/gpt-4o
          title: GPT-4o (OpenAI)
        - enum:
            - anthropic/claude-opus-4-5
          title: Claude Opus 4.5 (Anthropic)
        - enum:
            - anthropic/claude-sonnet-4-5
          title: Claude Sonnet 4.5 (Anthropic)
        - enum:
            - anthropic/claude-haiku-4-5
          title: Claude Haiku 4.5 (Anthropic)
        - enum:
            - google/gemini-2.0-flash
          title: Gemini 2.0 Flash (Google)
        - enum:
            - google/gemini-2.5-pro
          title: Gemini 2.5 Pro (Google)
        - enum:
            - deepseek/deepseek-chat
          title: DeepSeek Chat
      default: openai/gpt-4o-mini
    anthropicApiKey:
      type: string
      title: Anthropic API Key
      description: "Optional: injected as ANTHROPIC_API_KEY into the agent container."
    openaiApiKey:
      type: string
      title: OpenAI API Key
      description: "Optional: injected as OPENAI_API_KEY into the agent container."
benefits:
  - title: Full Agent + UI in One Stack
    description: Deploy the Hermes Agent gateway and the browser WebUI together in a single click, fully wired via shared volumes with no manual networking configuration.
  - title: Persistent Memory & Skills
    description: The agent remembers your conversations, builds skills from experience, and retains context across sessions — all stored on your own server.
  - title: Password-Protected Remote Access
    description: The WebUI enforces password authentication over your Easypanel HTTPS domain, keeping your autonomous agent safe from unauthorized access.
  - title: Multi-Provider Model Support
    description: Switch between OpenAI, Anthropic, Google, DeepSeek, and other providers from the UI model selector without reconfiguring the agent.
features:
  - title: Hermes Agent Gateway
    description: Runs in gateway mode to handle background tasks, cron jobs, Telegram/Discord/Slack messaging, and event hooks independently of the WebUI.
  - title: Three-Panel Chat Interface
    description: Claude-style browser UI with sessions sidebar, streaming chat with inline tool-call cards, and a resizable workspace file browser.
  - title: Shared Volume Interop
    description: Agent and WebUI share named Docker volumes (hermes-home and hermes-agent-src) for config, sessions, and memory — no inter-service HTTP required.
  - title: Session Management
    description: Create, rename, pin, archive, tag, search, and export sessions as Markdown or JSON from the browser.
  - title: Tasks, Skills & Memory Panels
    description: Manage cron jobs, browse and edit skills, and view or edit MEMORY.md and USER.md directly from the WebUI side panels.
tags:
  - AI
  - Automation
  - Self-Hosted
  - Developer Tools
  - Productivity
