name: Hermes WebUI
description: |
  Hermes WebUI is a lightweight, dark-themed web browser interface for [Hermes Agent](https://hermes-agent.nousresearch.com/) — a sophisticated autonomous AI agent that remembers what it learns and gets more capable the longer it runs.

  This template deploys **both** the Hermes Agent and the Hermes WebUI in a single container using the official Docker image. The WebUI provides full 1:1 parity with the Hermes CLI, accessible from any browser with an optional password for secure remote access.

  **Features include:**
  - Three-panel Claude-style layout (sessions, chat, workspace file browser)
  - Streaming responses via SSE with multi-provider model support (OpenAI, Anthropic, Google, DeepSeek, Nous Portal, OpenRouter)
  - Session management: create, rename, pin, archive, search, export/import
  - Workspace file browser with preview, edit, create, and delete capabilities
  - Cron job scheduling (Tasks panel) and skill management
  - Persistent memory (MEMORY.md / USER.md) and agent state
  - Password protection via `HERMES_WEBUI_PASSWORD`

instructions: |
  ## Getting Started

  1. **Configure your AI provider keys** — After deployment, open the Hermes config at the mounted state volume path. You need at least one provider API key (e.g. `OPENAI_API_KEY`, `ANTHROPIC_API_KEY`) configured in `~/.hermes/config.yaml`.

  2. **Password protection** — The `HERMES_WEBUI_PASSWORD` you set during setup will be required to access the UI. Keep it secure.

  3. **First boot** — On first launch the container installs the Hermes Agent Python package and its dependencies. This may take 1–2 minutes. Check container logs if the page doesn't load immediately.

  4. **State persistence** — Sessions, memory, skills, and agent state are stored in the `hermes-home` volume mounted at `/home/hermeswebui/.hermes`.

  5. **Workspace** — The `/workspace` volume is mounted as the default workspace and is browsable from the WebUI's right panel.

  ## Useful environment variables (add via Easypanel env editor)
  - `HERMES_WEBUI_DEFAULT_MODEL` — override the default model (e.g. `anthropic/claude-sonnet-4-5`)
  - `HERMES_WEBUI_BOT_NAME` — display name for the assistant (default: `Hermes`)
  - `HERMES_HOME` — base directory for Hermes state (default: `/home/hermeswebui/.hermes`)

benefits:
  - title: Autonomous AI Agent in Your Browser
    description: Access the full power of Hermes Agent — autonomous tool use, shell commands, file operations, web search, and memory — from any browser. No terminal needed.
  - title: Persistent Memory & Learning
    description: Hermes remembers conversations, learns your preferences, and stores skills across sessions. The agent gets more capable the longer it runs.
  - title: Multi-Provider Model Support
    description: Switch between OpenAI, Anthropic, Google, DeepSeek, Nous Portal, and OpenRouter models from a dynamic dropdown in the UI. No reconfiguration required.
  - title: Self-Hosted & Private
    description: All conversations, memory, and files stay on your own server. Password protection keeps the UI secure when exposed to the internet.
  - title: Cron Scheduling & Background Tasks
    description: Schedule recurring tasks via the Tasks panel. Receive toast notifications and badge alerts when background agent jobs complete.

features:
  - title: Three-Panel Chat Interface
    description: Claude-style layout with a sessions sidebar, central chat window, and a resizable workspace file browser panel on the right.
  - title: Streaming Chat with Tool Cards
    description: Tokens stream in real time via SSE. Tool calls (shell, file ops, web search) appear inline as collapsible cards showing name, args, and result snippets.
  - title: Session Management
    description: Create, rename, duplicate, delete, pin, archive, and tag sessions. Search across titles and message content. Export as Markdown or JSON.
  - title: Workspace File Browser
    description: Browse, preview, edit, create, delete, and rename files directly in the right panel with syntax highlighting via Prism.js and Markdown rendering.
  - title: Password Protection
    description: Set HERMES_WEBUI_PASSWORD to require authentication before accessing the UI — essential for public-facing deployments.
  - title: Mermaid Diagram Rendering
    description: Flowcharts, sequence diagrams, and Gantt charts embedded in agent responses render inline automatically.

tags:
