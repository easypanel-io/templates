name: Hermes WebUI
description: |
  Deploy **Hermes Agent** + **Hermes WebUI** as two interoperating services on Easypanel.

  [Hermes Agent](https://hermes-agent.nousresearch.com/) (`nousresearch/hermes-agent`) is an autonomous AI agent that runs as a persistent gateway — handling CLI, cron jobs, Telegram/Discord messaging, memory, and skills.

  [Hermes WebUI](https://github.com/nesquena/hermes-webui) (`ghcr.io/nesquena/hermes-webui`) is a lightweight dark-themed browser interface that gives you full 1:1 parity with the Hermes CLI — sessions, streaming chat, workspace file browser, cron tasks, skills, memory — all from any browser.

  **How they interoperate:**
  The two containers share two named volumes:
  - `hermes-home` — shared Hermes state directory (config, API keys, sessions, memory, skills, cron). The agent writes to it; the WebUI reads from it.
  - `hermes-agent-src` — the agent's source code, mounted into the WebUI container at startup so it can install the agent's Python dependencies via `uv pip install`.

  The WebUI never runs the agent itself — it imports Hermes Python modules directly to invoke `run_agent()`, which means agent calls happen inside the WebUI process but use the agent's exact same code and config.

instructions: |
  ## First-time setup

  1. **Run the Hermes Agent setup wizard first.** The agent container needs a valid `.env` with your API keys before the WebUI can use it.
     Open a shell into the agent container and run:
     ```
     docker exec -it <project>_hermes-agent hermes setup
     ```
     Or set your API keys directly via the **Environment** tab of the `hermes-agent` service in Easypanel (e.g. `ANTHROPIC_API_KEY`, `OPENAI_API_KEY`).

  2. **WebUI first boot takes 1–2 minutes** while the init script installs the Hermes Agent Python package from the shared `hermes-agent-src` volume into its own venv.

  3. **Password** — The `HERMES_WEBUI_PASSWORD` you set is required to access the UI. Set a strong value — it is your only auth layer.

  4. Visit your Easypanel domain for the `hermes-webui` service. You will be prompted to enter the password.

  ## Adding API keys after deployment
  Edit the `hermes-agent` service environment variables in Easypanel and redeploy, or write them directly to the `hermes-home` volume at `.hermes/config.yaml` / `.hermes/.env`.

  ## Important notes
  - **Never run two agent containers against the same `hermes-home` volume** — the session store is not designed for concurrent writes.
  - The `hermes-agent` service runs in `gateway run` mode — it handles Telegram/Discord/cron in the background.
  - The WebUI connects to the agent by importing its Python modules (shared via `hermes-agent-src`), not via HTTP.

benefits:
  - title: Full Agent + UI Stack
    description: Both the autonomous Hermes Agent (gateway, cron, messaging) and the browser WebUI deploy together as a production-ready stack with a single click.
  - title: Shared State via Volumes
    description: Agent and WebUI share a single Hermes home volume — sessions, memory, skills, and config are always in sync between the two containers without any network API.
  - title: Password-Protected Remote Access
    description: The WebUI enforces password authentication, making it safe to expose publicly via your Easypanel domain over HTTPS.
  - title: Persistent Memory & Learning
    description: Hermes remembers your conversations, builds skills from experience, and retains context across sessions — all stored in a persistent volume on your own server.
  - title: Multi-Provider AI Models
    description: Switch between OpenAI, Anthropic, Google, DeepSeek, Nous Portal, and OpenRouter models from the UI without reconfiguring the agent.

features:
  - title: Hermes Agent Gateway
    description: The agent container runs in gateway mode — handling background tasks, cron schedules, Telegram/Discord/Slack messaging, and event hooks independently of the WebUI.
  - title: Three-Panel WebUI
    description: Claude-style browser interface with a sessions sidebar, streaming chat with tool call cards, and a resizable workspace file browser with syntax-highlighted preview and editing.
  - title: Shared Volume Interop
    description: Two named Docker volumes (hermes-home and hermes-agent-src) provide the interop bridge — no network ports between services, just shared filesystem state.
  - title: Session Management
    description: Create, rename, pin, archive, tag, search, export (Markdown/JSON), and import sessions directly from the browser.
  - title: Tasks, Skills & Memory Panels
    description: Manage cron jobs, browse and edit skills, and view/edit MEMORY.md and USER.md directly from the WebUI's side panels.
  - title: Mermaid & File Preview
    description: Flowcharts and sequence diagrams render inline. The workspace panel previews text, Markdown, code (Prism.js), and images.

