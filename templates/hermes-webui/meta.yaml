schema:
  type: object
  required:
    - appServiceName
    - appServiceImage
    - hermesWebUIPassword
  properties:
    appServiceName:
      type: string
      title: App Service Name
      default: hermes-webui
      description: Name for the Hermes WebUI service in Easypanel.
    appServiceImage:
      type: string
      title: Docker Image
      default: ghcr.io/nesquena/hermes-webui:latest
      description: Docker image to use. The official GHCR image bundles both the WebUI and the Hermes Agent.
    hermesWebUIPassword:
      type: string
      title: WebUI Password
      description: Password required to access the Hermes WebUI. Set a strong password — this is your only authentication layer.
    defaultModel:
      type: string
      title: Default AI Model
      default: openai/gpt-4o-mini
      description: "Default model shown in the UI model selector. Examples: openai/gpt-4o, anthropic/claude-sonnet-4-5, google/gemini-2.0-flash"
    botName:
      type: string
      title: Bot Display Name
      default: Hermes
      description: Display name for the assistant shown in the chat interface.
