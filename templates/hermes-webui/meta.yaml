schema:
  type: object
  required:
    - agentServiceName
    - agentServiceImage
    - webuiServiceName
    - webuiServiceImage
    - hermesWebUIPassword
  properties:
    agentServiceName:
      type: string
      title: Agent Service Name
      default: hermes-agent
      description: Easypanel service name for the Hermes Agent container.
    agentServiceImage:
      type: string
      title: Agent Docker Image
      default: nousresearch/hermes-agent:latest
      description: Official Hermes Agent image from Docker Hub.
    webuiServiceName:
      type: string
      title: WebUI Service Name
      default: hermes-webui
      description: Easypanel service name for the Hermes WebUI container.
    webuiServiceImage:
      type: string
      title: WebUI Docker Image
      default: ghcr.io/nesquena/hermes-webui:latest
      description: Official Hermes WebUI image from GitHub Container Registry.
    hermesWebUIPassword:
      type: string
      title: WebUI Password
      description: Password required to access the browser UI. Set a strong value — this is your only authentication layer.
    anthropicApiKey:
      type: string
      title: Anthropic API Key
      description: "Your Anthropic API key (sk-ant-...). Used by Hermes Agent for Claude models. Can also be configured post-deployment in the agent's .hermes/.env file."
    openaiApiKey:
      type: string
      title: OpenAI API Key
      description: "Your OpenAI API key (sk-...). Used by Hermes Agent for GPT models. Can also be configured post-deployment."
    defaultModel:
      type: string
      title: Default AI Model
      default: openai/gpt-4o-mini
      description: "Default model shown in the WebUI model selector. Examples: openai/gpt-4o, anthropic/claude-sonnet-4-5, google/gemini-2.0-flash"
    botName:
      type: string
      title: Bot Display Name
      default: Hermes
      description: Display name for the assistant shown in the WebUI chat interface.
