name: Hermes WebUI
description: |
  Hermes WebUI is a lightweight, dark-themed browser interface for Hermes Agent — an autonomous AI agent by Nous Research that remembers what it learns, executes shell commands, manages files, schedules cron tasks, and integrates with Telegram, Discord, and Slack. This template deploys the Hermes Agent container alongside the Hermes WebUI, with the two sharing a state volume so the WebUI can run the agent directly from your browser with password-protected access.
instructions: |
  On first boot, the agent container bootstraps the shared /opt/data volume with default config and the agent source. The WebUI then installs the agent Python package from that volume (this takes 1–2 minutes on first start). Open a terminal into the hermes-agent service and run "hermes setup" to configure API keys and model provider, or set ANTHROPIC_API_KEY / OPENAI_API_KEY in the agent service environment. Messaging gateways (Telegram, Discord, Slack) are optional — configure them later with "hermes gateway setup".
changeLog:
  - date: "2025-04-16"
    description: Initial release
links:
  - label: Website
    url: https://hermes-agent.nousresearch.com/
  - label: Documentation
    url: https://hermes-agent.nousresearch.com/docs
  - label: Github
    url: https://github.com/nesquena/hermes-webui
contributors:
  - name: Community
    url: https://github.com/nesquena/hermes-webui/graphs/contributors
schema:
  type: object
  required:
    - agentServiceName
    - agentServiceImage
    - webuiServiceName
    - webuiServiceImage
  properties:
    agentServiceName:
      type: string
      title: Agent Service Name
      default: hermes-agent
    agentServiceImage:
      type: string
      title: Agent Image
      default: nousresearch/hermes-agent:latest
    webuiServiceName:
      type: string
      title: WebUI Service Name
      default: hermes-webui
    webuiServiceImage:
      type: string
      title: WebUI Image
      default: ghcr.io/nesquena/hermes-webui:latest
    webuiPassword:
      type: string
      title: WebUI Password
      description: Password to protect the browser UI. Auto-generated if left blank.
    defaultModel:
      type: string
      title: Default AI Model
      oneOf:
        - enum:
            - openai/gpt-4o-mini
          title: GPT-4o Mini (OpenAI)
        - enum:
            - openai/gpt-4o
          title: GPT-4o (OpenAI)
        - enum:
            - anthropic/claude-opus-4-5
          title: Claude Opus 4.5 (Anthropic)
        - enum:
            - anthropic/claude-sonnet-4-5
          title: Claude Sonnet 4.5 (Anthropic)
        - enum:
            - anthropic/claude-haiku-4-5
          title: Claude Haiku 4.5 (Anthropic)
        - enum:
            - google/gemini-2.0-flash
          title: Gemini 2.0 Flash (Google)
        - enum:
            - google/gemini-2.5-pro
          title: Gemini 2.5 Pro (Google)
        - enum:
            - deepseek/deepseek-chat
          title: DeepSeek Chat
      default: openai/gpt-4o-mini
    anthropicApiKey:
      type: string
      title: Anthropic API Key
      description: "Optional: injected as ANTHROPIC_API_KEY into the agent container."
    openaiApiKey:
      type: string
      title: OpenAI API Key
      description: "Optional: injected as OPENAI_API_KEY into the agent container."
benefits:
  - title: Autonomous AI Agent in Your Browser
    description: Access the full Hermes Agent — autonomous tool use, shell commands, file operations, web search, and memory — from any browser with password-protected HTTPS access.
  - title: Persistent Memory & Skills
    description: The agent remembers your conversations, builds skills from experience, and retains context across sessions — all stored on your own server in a persistent Docker volume.
  - title: Multi-Provider Model Support
    description: Switch between OpenAI, Anthropic, Google, DeepSeek, and other providers from the UI model selector without reconfiguring the agent.
  - title: Self-Hosted & Private
    description: All conversations, memory, files, and API keys stay on your own server. No data leaves your infrastructure.
features:
  - title: Hermes Agent
    description: The full Hermes Agent runtime with shell, file, web-search, memory, and skill tools — optionally extensible with MCP servers and Telegram/Discord/Slack gateways.
  - title: Three-Panel Chat Interface
    description: Claude-style browser UI with sessions sidebar, streaming chat with inline tool-call cards, and a resizable workspace file browser.
  - title: Shared Volume Interop
    description: Agent and WebUI share named Docker volumes for config, sessions, and memory — no inter-service HTTP required, everything syncs via the filesystem.
  - title: Session Management
    description: Create, rename, pin, archive, tag, search, and export sessions as Markdown or JSON from the browser.
  - title: Tasks, Skills & Memory Panels
    description: Manage cron jobs, browse and edit skills, and view or edit MEMORY.md and USER.md directly from the WebUI side panels.
tags:
  - AI
  - Automation
  - Self-Hosted
  - Developer Tools
  - Productivity
