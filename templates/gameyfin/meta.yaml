name: Gameyfin
description:
  Gameyfin is a free and open-source application for managing your video game
  library. Track installed and wanted games, fetch metadata (e.g. IGDB, Steam),
  and use plugins for downloads and extra providers. It runs as a Kotlin /
  Spring Boot app with a web UI, PF4J plugins, and optional OIDC. Docker is the
  recommended install path; persist db, data, plugin data, logs, and mount at
  least one folder for your game files.

instructions: |
  APP_KEY is generated on deploy (32 random bytes, Base64). Do not change it
  after data exists or the app cannot decrypt secrets in the database; if you
  recreate the service, restore the same APP_KEY from a backup.
  Libraries: Put (or bind) your games under the library volume; inside
  Gameyfin, add libraries whose paths are under `/library`
  (https://gameyfin.org/installation/getting-started/).
  PUID / PGID default to 1000; set them to your host user/group if file
  permissions on mounted volumes are wrong.
  Optional: for the bundled torrent plugin, publish host ports 6969 and 6881
  on this service.

changeLog:
  - date: 2025-10-02
    description: First Release
  - date: 2026-03-20
    description:
      Website/docs links, setup instructions, plugindata volume, /library mount,
      Base64 APP_KEY, APP_URL, configurable PUID/PGID (1000), image pin 2.4.0

links:
  - label: Website
    url: https://gameyfin.org
  - label: Documentation
    url: https://gameyfin.org/installation/docker/
  - label: GitHub
    url: https://github.com/gameyfin/gameyfin
  - label: Container registry (GHCR)
    url: https://github.com/gameyfin/gameyfin/pkgs/container/gameyfin

contributors:
  - name: Ahson Shaikh
    url: https://github.com/Ahson-Shaikh

schema:
  type: object
  required:
    - appServiceName
    - appServiceImage
    - puid
    - pgid
  properties:
    appServiceName:
      type: string
      title: App Service Name
      default: gameyfin
    appServiceImage:
      type: string
      title: Gameyfin Image
      default: ghcr.io/gameyfin/gameyfin:2.4.0
    puid:
      type: string
      title: PUID
      default: "1000"
      description: Container user ID for file ownership (non-root).
    pgid:
      type: string
      title: PGID
      default: "1000"
      description: Container group ID for file ownership (non-root).

benefits:
  - title: Self-hosted library
    description:
      Own your metadata and library layout without relying on a hosted service.
  - title: Metadata & plugins
    description:
      Multiple metadata sources and a plugin system with data under plugindata.
  - title: Reverse-proxy ready
    description:
      APP_URL is set from your primary domain for correct links and first-run
      logs.

features:
  - title: Library & metadata
    description: Organize games and enrich them with IGDB and other providers.
  - title: Plugin system
    description:
      Download and metadata plugins; state persists in /opt/gameyfin/plugindata.
  - title: Docker layout
    description:
      Matches upstream compose for db, data, plugindata, logs, plus a library
      path.
  - title: Encrypted DB fields
    description:
      APP_KEY secures sensitive values stored in the embedded database.
  - title: Authentication
    description: Local accounts and optional OpenID Connect.

tags:
  - Games
  - Library
  - Self-Hosted
  - Metadata
  - Docker
  - IGDB
