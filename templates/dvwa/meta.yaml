benefits:
  - title: Hands-On Vulnerability Practice
    description:
      Practise exploiting and defending against the most common web
      vulnerabilities — SQL injection, XSS, CSRF, file inclusion, and more — in
      a safe, isolated environment with no risk to real systems.
  - title: Adjustable Difficulty Levels
    description:
      Each vulnerability module ships with low, medium, high, and impossible
      security levels so learners can progress from beginner exploits to
      hardened defences at their own pace.
  - title: Self-Hosted and Isolated
    description:
      Run DVWA entirely on your own infrastructure, keeping all training
      activity off the public internet and fully under your control.
  - title: Broad Curriculum Coverage
    description:
      Covers the OWASP Top 10 and beyond, making DVWA suitable for security
      certifications, university courses, and professional penetration testing
      practice.

features:
  - title: SQL Injection
    description:
      Classic and blind SQL injection labs that let you extract data, bypass
      authentication, and understand parameterised query defences.
  - title: Cross-Site Scripting (XSS)
    description:
      Reflected, stored, and DOM-based XSS modules demonstrating how
      user-supplied input can be weaponised in a browser context.
  - title: Command Injection
    description:
      Inject operating system commands through a vulnerable ping form and learn
      how input sanitisation prevents arbitrary code execution.
  - title: CSRF
    description:
      Cross-Site Request Forgery labs showing how attackers can trick
      authenticated users into performing unintended actions.
  - title: File Inclusion & Upload
    description:
      Local and remote file inclusion exercises, plus an unrestricted file
      upload module that demonstrates server-side upload validation bypasses.
  - title: Brute Force
    description:
      A login form with no rate-limiting or account lockout, ideal for
      practising credential stuffing and dictionary attack techniques.

tags:
