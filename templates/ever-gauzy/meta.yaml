name: Ever Gauzy
description:
  Ever Gauzy is an open business management platform covering ERP CRM HRM ATS
  and project management with time tracking invoicing and reporting. This
  template deploys the official API web UI and PostgreSQL stack similar to the
  upstream docker compose demo layout.
instructions:
  Deploy and wait for PostgreSQL the API and the web UI to become healthy. Open
  the web service URL shown in Easypanel. Register yourself and complete the
  wizard to start using the application.
changeLog:
  - date: "2026-04-03"
    description: "Initial template with PostgreSQL Gauzy API and Gauzy web UI"
links:
  - label: Website
    url: https://gauzy.co/
  - label: Documentation
    url: https://docs.gauzy.co/
  - label: GitHub
    url: https://github.com/ever-co/ever-gauzy
contributors:
  - name: Ahson Shaikh
    url: https://github.com/Ahson-Shaikh
schema:
  type: object
  required:
    - appServiceName
    - apiServiceImage
    - webServiceImage
  properties:
    appServiceName:
      type: string
      title: App Service Name
      default: ever-gauzy
    apiServiceImage:
      type: string
      title: Gauzy API Image
      default: ghcr.io/ever-co/gauzy-api:latest
    webServiceImage:
      type: string
      title: Gauzy Web Image
      default: ghcr.io/ever-co/gauzy-webapp:latest
benefits:
  - title: All in One Operations
    description:
      Combines HR CRM projects time tracking and financial workflows in one
      platform.
  - title: Open Source AGPL
    description:
      Source available platform you can audit extend and host yourself.
  - title: PostgreSQL Metadata
    description:
      Persists application data in a managed PostgreSQL service with generated
      credentials.
features:
  - title: Time and Activity Tracking
    description:
      Track employee time activity and productivity with timesheets and related
      workflows.
  - title: CRM and Sales
    description: Manage contacts pipelines proposals and customer relationships.
  - title: Projects and Tasks
    description: Organize work with projects tasks goals and team coordination.
  - title: Invoicing and Accounting
    description:
      Supports estimates invoices payments and expense oriented workflows.
tags:
  - ERP
  - CRM
  - HRM
  - Business Management
  - Time Tracking
