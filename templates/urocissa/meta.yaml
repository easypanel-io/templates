name: Urocissa
description:
  Urocissa is a self-hosted photo and video gallery designed to serve massive
  collections, capable of handling millions of images and videos. Built with
  Rust and Vue, it features blazing fast performance with an in-memory cached
  database that can instantly serve, search, and filter one million photos in
  under a second. It runs on as little as 4 GB of RAM even with a million
  photos, offers infinite scrolling without pagination using advanced virtual
  scrolling, and supports instant boolean search (and, or, not) across your
  entire library. Features include upload support, auto-sync from local folders,
  EXIF data extraction, user-defined tags, duplicate handling, shareable albums,
  and read-only mode.
instructions: Default password is generated automatically.
changeLog:
  - date: 2026-03-02
    description: First Release (v2.0.12)
