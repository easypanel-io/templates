name: qwe-qwe

description:
  qwe-qwe is a business-oriented AI agent designed to drop into real workflows —
  customer ops, internal automation, knowledge retrieval, scheduled reporting,
  custom integrations. Deploy on your own infrastructure and bring any
  OpenAI-compatible LLM provider — Azure OpenAI, AWS Bedrock, OpenAI, Groq,
  OpenRouter, DeepSeek, Together — or run a local model via LM Studio or Ollama
  for fully on-prem deployments. Chat via web UI, terminal, or Telegram. Your
  data, your provider, your rules.

instructions:
  After deployment, open the Web UI and go to Settings → Model to configure your
  LLM provider. Set the LLM Provider URL to your provider endpoint (e.g.
  https://api.openai.com/v1 for OpenAI) and the LLM API Key to your key. For
  Telegram bot support, go to Settings → Telegram and follow the setup wizard.

