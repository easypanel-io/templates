name: farmOS
description:
  farmOS is a web-based farm management and record-keeping platform built on
  Drupal. It helps track assets, logs, plans, and maps for agricultural
  operations while remaining fully self-hosted and extensible.
instructions:
  After deployment, open your domain and complete the farmOS web installer. In
  the database step, choose SQLite and use a database file path under
  `sites/default/files` so it remains persistent. This template persists the
  farmOS `sites` and `keys` directories for settings, uploaded files, SQLite
  database storage, and key material across upgrades.
changeLog:
  - date: 2026-04-13
    description: Initial template release

links:
  - label: Website
    url: https://farmos.org/
  - label: Documentation
    url: https://farmos.org/hosting/install/
  - label: Github
    url: https://github.com/farmOS/farmOS
  - label: Docker Hub
    url: https://hub.docker.com/r/farmos/farmos
contributors:
  - name: Ahson Shaikh
    url: https://github.com/Ahson-Shaikh
schema:
  type: object
  required:
    - appServiceName
    - appServiceImage
  properties:
    appServiceName:
      type: string
      title: App Service Name
      default: farmos
    appServiceImage:
      type: string
      title: App Service Image
      default: farmos/farmos:4.0.0
benefits:
  - title: Purpose-built for farm records
    description:
      Track assets, field activities, equipment, and observations in one
      centralized system designed for agricultural workflows.
  - title: Open-source and extensible
    description:
      Build on Drupal's ecosystem with modules, integrations, and custom data
      models tailored to your farm operations.
  - title: Self-hosted data ownership
    description:
      Keep sensitive operational data under your control while still providing a
      modern, web-based management interface.
features:
  - title: Asset and log management
    description:
      Create structured records for fields, animals, equipment, and operational
      events with reusable log types.
  - title: Mapping and planning tools
    description:
      Organize locations, plans, and timelines to support seasonal planning and
      day-to-day execution.
  - title: Persistent application state
    description:
      Persists `sites` and `keys` directories so uploads, configuration, and key
      files survive container updates.
tags:
  - Agriculture
  - Farm Management
  - Record Keeping
  - Drupal
  - Self-Hosted
