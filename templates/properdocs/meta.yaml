name: ProperDocs
description:
  ProperDocs is a fast, simple, and gorgeous static site generator for project
  documentation, forked from MkDocs. It converts Markdown source files into a
  fully navigable static HTML site using a single YAML configuration file. The
  built-in live-reload dev server lets you preview and edit your documentation
  in the browser as you write. ProperDocs is a drop-in replacement for MkDocs,
  maintaining full compatibility while adding bug fixes and incremental
  improvements. This template runs the ProperDocs development server in a
  container so you can author and browse your docs from any browser, with your
  content persisted in a volume.
instructions:
  After deployment, open your app domain to see the live documentation preview.
  Your docs are stored in the /docs volume. To add or edit pages, use
  Easypanel's volume file manager or mount the volume on your host and edit the
  Markdown files directly. The configuration file is properdocs.yml at the root
  of the volume. The server auto-reloads on every file change. To change the
  site name, edit the site_name field in properdocs.yml and the page will
  refresh automatically.
changeLog:
  - date: 2026-06-05
    description: Initial Template Release (v1.6.7)
links:
  - label: GitHub
    url: https://github.com/ProperDocs/properdocs
  - label: Website
