    url: https://github.com/Ahson-Shaikh
schema:
  type: object
  required:
    - appServiceName
  properties:
    appServiceName:
      type: string
      title: App Service Name
      default: properdocs
    siteName:
      type: string
      title: Site Name
      default: My Documentation
      description: The name shown in the navigation bar and browser tab.
benefits:
  - title: MkDocs-Compatible Drop-In Replacement
    description:
      ProperDocs is a direct fork of MkDocs — existing mkdocs.yml projects work
      unchanged. You get the same simple Markdown-to-HTML workflow with bug
      fixes and new features on top.
  - title: Live-Reload Preview Server
    description:
      The built-in dev server watches your docs directory and configuration file
      for changes, reloading the browser automatically so you always see an
      up-to-date preview.
  - title: Single YAML Configuration
    description:
      One properdocs.yml file controls site name, navigation structure, theme,
      plugins, and extensions — no complex build tooling or frontend knowledge
      required.
  - title: Self-Hosted and Open Source
    description:
      Own your documentation stack completely. BSD-2-Clause licensed, no
      third-party tracking, no rate limits, no account required.
features:
  - title: Markdown to HTML Generation
    description:
      Write pages in plain Markdown and ProperDocs assembles a fully navigable
      HTML site with sidebar navigation, search, and breadcrumbs.
  - title: Theme Support
    description:
      Ships with the mkdocs and readthedocs themes. Additional community themes
      installable via pip; active theme is set in properdocs.yml.
  - title: Plugin and Extension System
    description:
      Extend functionality with plugins for search, redirects, tags, and more.
      Python-Markdown extensions add tables, admonitions, code highlighting, and
      other rich content blocks.
  - title: Navigation Authoring
    description:
      Define page order and section grouping explicitly via the nav key in
      properdocs.yml, or let ProperDocs auto-discover and sort pages from the
      docs folder.
  - title: Static Export
    description:
      Run properdocs build to produce a portable static site in the site/
      directory — deploy to any web server, GitHub Pages, or S3 bucket.
tags:
  - Documentation
  - Static Site Generator
  - Developer Tools
  - Self-Hosted
  - Open Source
  - Python
