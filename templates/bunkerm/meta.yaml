name: BunkerM
description:
  BunkerM is a free, open-source, containerized MQTT management platform that
  bundles Eclipse Mosquitto with a full-featured web dashboard in a single
  Docker image. It provides dynamic security management for clients, roles,
  groups, and ACLs, real-time monitoring of connections and broker logs, a
  built-in MQTT browser for exploring topics and payloads, message history with
  replay, local automation through schedulers and watchers, anomaly detection,
  and optional cloud AI integration via BunkerAI. Everything deploys with a
  single container — no external database or message broker needed.
instructions:
  After deployment open the web UI at your configured domain. Log in with the
  default credentials — email "admin@example.com" and password "password123".
  Change the password immediately after the first login / signup using the
  wizard. The MQTT broker is accessible on port 1900 (TCP). Use the MQTT
  Username and MQTT Password environment variables to connect external IoT
  clients.
changeLog:
