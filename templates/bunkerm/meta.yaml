schema:
  type: object
  required:
    - appServiceName
    - appServiceImage
  properties:
    appServiceName:
      type: string
      title: App Service Name
      default: bunkerm
    appServiceImage:
      type: string
      title: App Service Image
      default: bunkeriot/bunkerm:v2.1.0
benefits:
  - title: All-in-One MQTT Platform
    description:
      A complete MQTT broker and management dashboard in a single container — no
      separate Mosquitto install, no external databases, no complex setup.
  - title: Dynamic Security Management
    description:
      Create and manage MQTT clients, roles, groups, and ACLs at runtime through
      the web UI without restarting the broker.
  - title: Real-Time Monitoring
    description:
      Live dashboard shows connected clients, message throughput, subscription
      counts, and byte transfer charts updated in real time.
features:
  - title: Eclipse Mosquitto Broker
    description:
      Runs a full production-grade Mosquitto MQTT broker on port 1900 with
      dynamic security plugin enabled out of the box.
  - title: MQTT Browser
    description:
      Explore topics, inspect payloads, and replay historical messages directly
      from the web UI without a separate MQTT client.
  - title: Local Automations
    description:
      Define schedulers and watchers to trigger MQTT publishes or alerts based
      on time, topic patterns, or payload conditions.
  - title: Anomaly Detection
    description:
      Built-in anomaly detection flags unusual message patterns or unauthorized
      connection attempts in the broker log view.
  - title: BunkerAI Integration
    description:
      Optionally connect to the BunkerAI cloud service to query broker state and
      automate responses via web chat, Slack, or Telegram.
tags:
  - MQTT
  - IoT
  - Monitoring
  - Self-Hosted
