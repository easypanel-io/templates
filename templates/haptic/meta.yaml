name: Haptic
description:
  Haptic is a local-first, privacy-focused, open-source markdown note-taking
  app built with Svelte and PGlite. All notes are stored directly in your
  browser's IndexedDB — no account, no cloud sync, and no server-side database
  required. It features an inline Markdown editor with live preview, a
  file-tree sidebar, daily notes, a task tracker, and full-text search with
  regex support. The Docker image is a tiny (~72 MB) nginx container that
  serves the static web app; data lives entirely in the client.
instructions:
  Open the app at your domain after deployment. No login or setup is required
  — Haptic runs entirely in your browser using PGlite (WebAssembly SQLite via
  IndexedDB). Create your first note using the sidebar and start writing
  Markdown immediately. Notes persist in your browser's local storage, so
  clearing browser data will erase them.
changeLog:
  - date: "2026-06-26"
    description: First Release
