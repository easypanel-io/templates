name: Trailarr
description:
  Trailarr is a self-hosted application to automatically download and manage
  trailers for your media libraries. It integrates with Radarr and Sonarr to
  discover your movie and TV collections, detects existing trailers to skip
  duplicates, and saves new trailers next to your media using Plex-compatible
  naming conventions that also work with Emby and Jellyfin. Custom profiles let
  you control trailer quality, format, and processing options, while a built-in
  web UI lets you browse your library and manage trailers directly. Trailarr
  supports multiple Radarr, Sonarr, and Plex instances and handles video
  processing via yt-dlp and FFmpeg.
instructions:
  After deployment, open the web UI and log in with the default credentials —
  username "admin" and password "trailarr". Change the password immediately after
  the first login. Then navigate to Settings and add your Radarr and/or Sonarr
  connection details. Map the media paths so Trailarr can locate and write trailer
  files next to your media.
