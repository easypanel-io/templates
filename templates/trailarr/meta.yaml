      default: nandyalu/trailarr:0.9.8
    timezone:
      type: string
      title: Timezone
      default: America/New_York
benefits:
  - title: Automatic Trailer Downloads
    description:
      Trailarr connects to your Radarr and Sonarr instances and automatically
      downloads trailers for every movie and series in your collection, keeping
      your media library enriched without manual effort.
  - title: Duplicate Detection
    description:
      Before downloading, Trailarr checks whether a trailer already exists and
      skips it, saving bandwidth and avoiding cluttered media folders.
  - title: Plex, Emby, and Jellyfin Compatible
    description:
      Trailers are saved using Plex naming conventions and are automatically
      recognized by Emby and Jellyfin, so they appear in the right place in your
      media server without any extra configuration.
features:
  - title: Multi-Instance Support
    description:
      Connect multiple Radarr, Sonarr, and Plex instances to manage trailers
      across separate servers or libraries from a single Trailarr deployment.
  - title: Custom Quality Profiles
    description:
      Create profiles to control trailer resolution, format, codec, and other
      processing options so every trailer meets your storage and quality
      requirements.
  - title: Web UI Library Browser
    description:
      Browse your entire movie and series library through a responsive web
      interface, view trailer status for each item, and trigger downloads or
      manage trailers manually.
  - title: yt-dlp and FFmpeg Integration
    description:
      Trailarr uses yt-dlp to download trailers from video hosting sites and
      FFmpeg for post-processing, giving you broad source support and flexible
      output options.
tags:
  - Media
  - Automation
  - Self-Hosted
