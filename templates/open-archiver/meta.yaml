name: Open Archiver
description: |
  Open Archiver is a secure, sovereign, and open-source platform for email
  archiving and eDiscovery. It provides universal ingestion from IMAP, Google
  Workspace, Microsoft 365, PST files, mbox files, and zipped .eml files.
  Emails are stored in standard .eml format with deduplication, compression,
  and optional AES-256 encryption at rest. Features include full-text search
  across emails and attachments (PDF, DOCX, etc.), thread discovery, file
  integrity verification, immutable audit trails, role-based access control,
  and pluggable storage backends (local or S3-compatible). Built with
  SvelteKit, Node.js, PostgreSQL, Meilisearch, and BullMQ.
instructions:
  After deployment, navigate to the main service URL. On first visit you will be
  redirected to /setup to create your admin account. Be sure you are the first
  person to access the instance. The default encryption key and JWT secret are
  auto-generated. Configure your email ingestion sources (IMAP, Google
  Workspace, Microsoft 365) from the dashboard after setup.
