benefits:
  - title: Legally Compliant Email Archiving
    description:
      Store emails in standard .eml format with file hash verification,
      integrity reports, and immutable audit trails for regulatory compliance.
  - title: Universal Email Ingestion
    description:
      Connect to any email provider including IMAP, Google Workspace, Microsoft
      365, PST files, mbox files, and zipped .eml imports.
  - title: Secure by Design
    description:
      AES-256 encryption at rest, deduplication, compression, and role-based
      access control with fine-grained AWS IAM-style policies.
  - title: Self-Hosted & Open Source
    description:
      Full control over your email archive data with no vendor lock-in. AGPL-3.0
      licensed and free to deploy on your own infrastructure.
features:
  - title: Full-Text Search
    description:
      Powered by Meilisearch for blazingly fast search across email content and
      attachments including PDF, DOCX, and more via Apache Tika.
  - title: Thread Discovery
    description:
      Automatically identifies email conversations and presents full context for
      eDiscovery and compliance review.
  - title: Pluggable Storage
    description:
      Supports local filesystem or S3-compatible object storage (AWS S3, MinIO)
      with optional encryption at rest.
  - title: Integrity Verification
    description:
      File hash values stored on ingestion with integrity reports to detect any
      unauthorized modifications to archived content.
  - title: Audit Trail
    description:
      Immutable logging of all system activities including who accessed what and
      when for compliance and accountability.
  - title: Retention Policies
    description:
      Define granular retention policies to automatically manage the lifecycle
      of archived email data.
tags:
  - Email
  - Archiving
  - eDiscovery
  - Compliance
  - Self-Hosted
