name: Open Archiver
description:
  Open Archiver is a secure, sovereign, and open-source platform for email
  archiving and eDiscovery. It provides universal ingestion from IMAP, Google
  Workspace, Microsoft 365, PST files, mbox files, and zipped .eml files. Emails
  are stored in standard .eml format with deduplication, compression, and
  optional AES-256 encryption at rest. Features include full-text search across
  emails and attachments (PDF, DOCX, etc.), thread discovery, file integrity
  verification, immutable audit trails, role-based access control, and pluggable
  storage backends (local or S3-compatible). Built with SvelteKit, Node.js,
  PostgreSQL, Meilisearch, and BullMQ.
instructions: |
  After deployment, open the app URL and complete /setup as the first user.
  Secrets (JWT, encryption keys, Meilisearch master key, Redis password) are
  generated by the template. Configure ingestion sources from the dashboard.
changeLog:
  - date: 2026-02-27
    description: First Release (v0.4.2)
links:
  - label: Website
    url: https://openarchiver.com
  - label: GitHub
    url: https://github.com/LogicLabs-OU/OpenArchiver
  - label: Documentation
    url: https://docs.openarchiver.com
contributors:
  - name: Ahson Shaikh
    url: https://github.com/Ahson-Shaikh
schema:
  type: object
  required:
    - appServiceName
    - appServiceImage
    - meilisearchImage
    - valkeyImage
    - tikaImage
  properties:
    appServiceName:
      type: string
      title: App Service Name
      default: open-archiver
    appServiceImage:
      type: string
      title: App Service Image
      default: logiclabshq/open-archiver:v0.4.2
    meilisearchImage:
      type: string
      title: Meilisearch Image
      default: getmeili/meilisearch:v1.15.2
    valkeyImage:
      type: string
      title: Valkey Image
      default: valkey/valkey:8.1.6-alpine3.23
    tikaImage:
      type: string
      title: Apache Tika Image
      default: apache/tika:3.2.2.0-full
benefits:
  - title: Legally compliant email archiving
    description:
      Store emails in standard .eml format with file hash verification,
      integrity reports, and immutable audit trails for regulatory compliance.
  - title: Universal email ingestion
    description:
      Connect to IMAP, Google Workspace, Microsoft 365, PST, mbox, and zipped
      .eml imports.
  - title: Secure by design
    description:
      AES-256 encryption at rest, deduplication, compression, and RBAC with
      fine-grained policies.
  - title: Self-hosted & open source
    description:
      AGPL-3.0; full control over your archive with no vendor lock-in.
features:
  - title: Full-text search
    description:
      Meilisearch-backed search across email content and attachments (Tika for
      PDF, DOCX, etc.).
  - title: Thread discovery
    description:
      Identifies conversations and context for eDiscovery and compliance.
  - title: Pluggable storage
    description:
      Local filesystem or S3-compatible storage with optional encryption at
      rest.
  - title: Integrity verification
    description:
      File hashes on ingestion with integrity reports to detect tampering.
  - title: Audit trail
    description: Immutable logging of access and actions for accountability.
  - title: Retention policies
    description: Granular policies for lifecycle management of archived mail.
tags:
  - Email
  - Archiving
  - eDiscovery
  - Compliance
  - Self-Hosted
