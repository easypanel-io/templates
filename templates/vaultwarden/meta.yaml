name: Vaultwarden
description:
  Vaultwarden is an unofficial Bitwarden server implementation designed for
  self-hosted deployments. It is written in Rust and is compatible with the
  official Bitwarden clients. This application is ideal for individuals,
  families, and smaller organizations who find the official resource-heavy
  service undesirable. Vaultwarden supports a wide range of features including
  personal and organization vault support, password sharing and access control,
  file attachments, two-step login via email, Duo, YubiKey, and FIDO2 WebAuthn,
  and many more. It also supports live sync for desktop/browser
  clients/extensions and mobile clients (Android/iOS). However, it does not
  prioritize the development of features mainly useful to larger organizations
  such as single sign-on and directory syncing.
instructions:
  "To access the administration interface go to /admin on your installation URL.
  The admin token is in your Environment tab. SMTP is optional — if no SMTP host
  is set, password hints are displayed in-app and email verification is disabled.


  Common provider settings:

  - SendGrid: host=smtp.sendgrid.net, port=587, security=starttls,
    username=apikey, password=<SG.* API key>, auth_mechanism=Login

  - Gmail: host=smtp.gmail.com, port=465, security=force_tls (use an App
    Password, not your Google account password)

  - Mailjet: host=in-v3.mailjet.com, port=587, security=starttls,
    auth_mechanism=Plain

  - Brevo (Sendinblue): host=smtp-relay.brevo.com, port=587,
    security=starttls

  - SMTP2GO: host=mail.smtp2go.com, port=587, security=starttls


  Note: Microsoft Outlook/Office 365 no longer supports basic SMTP auth and
  requires OAuth2, which Vaultwarden does not support."
changeLog:
  - date: 2022-11-19
    description: first release
  - date: 2026-06-03
    description: Added SMTP email support fields
links:
  - label: Documentation
    url: https://github.com/dani-garcia/vaultwarden/wiki
  - label: Github
    url: https://github.com/dani-garcia/vaultwarden
  - label: Enviroment Variables
    url: https://github.com/dani-garcia/vaultwarden/blob/main/.env.template
contributors:
  - name: Supernova3339
    url: https://github.com/Supernova3339
schema:
  type: object
  required:
    - appServiceName
    - appServiceImage
  properties:
    appServiceName:
      type: string
      title: App Service Name
      default: vaultwarden
    appServiceImage:
      type: string
      title: App Service Image
      default: vaultwarden/server:latest
    smtpHost:
      type: string
      title: SMTP Host
      default: ""
      description:
        Hostname of your SMTP server. Leave empty to disable email (password
        hints will be shown in-app instead).
    smtpFrom:
      type: string
      title: SMTP From Address
      default: ""
      description:
        Email address used as the sender (e.g. vaultwarden@example.com).
    smtpFromName:
      type: string
      title: SMTP From Name
      default: Vaultwarden
    smtpUsername:
      type: string
      title: SMTP Username
      default: ""
    smtpPassword:
      type: string
      title: SMTP Password
      default: ""
    smtpSecurity:
      type: string
      title: SMTP Security
      default: starttls
      description:
        "Secure connection type: starttls (port 587), force_tls (port 465), or
        off (port 25)."
    smtpPort:
      type: string
      title: SMTP Port
      default: "587"
    smtpAuthMechanism:
      type: string
      title: SMTP Auth Mechanism
      default: ""
      description:
        "Authentication mechanism used by your provider. Leave empty for the
        default (Plain + Login for SSL, nothing for non-SSL). Set to \"Login\"
        for SendGrid (username: apikey, password: your SG.* API key) and
        Outlook/Office 365. Possible values: Plain, Login, Xoauth2 (comma-
        separated for multiple)."
benefits:
  - title: Self-hosted deployment
    description:
      Vaultwarden allows you to host your own Bitwarden server, giving you full
      control over your data and privacy.
  - title: Compatibility with official Bitwarden clients
    description:
      Vaultwarden is fully compatible with the official Bitwarden clients,
      ensuring a seamless user experience.
  - title: Ideal for individuals, families, and smaller organizations
    description:
      Vaultwarden is designed to meet the needs of individuals, families, and
      smaller organizations, providing a lightweight and efficient solution.
features:
  - title: Web interface
    description:
      Access your vault and manage your passwords through a user-friendly web
      interface.
  - title: Password sharing and access control
    description:
      Share passwords securely with others and control their access to your
      shared items.
  - title: File attachments and website icons
    description:
      Attach files to your passwords and store website icons for easy
      identification.
  - title: Two-step login and authentication options
    description:
      Enhance the security of your vault with two-step login and authentication
      options, including email, Duo, YubiKey, and FIDO2 WebAuthn.
  - title: Emergency Access and Master password re-prompt
    description:
      Set up emergency access to your vault and enable master password re-prompt
      for added security.
  - title: Live sync for desktop/browser and mobile clients
    description:
      Keep your vault in sync across all your devices, including desktop/browser
      clients/extensions and mobile clients (Android/iOS).
tags:
  - Password Manager
  - Security
  - Self-hosted
