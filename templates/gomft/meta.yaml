name: GoMFT
description:
  GoMFT is an open-source Go-based Managed File Transfer platform with a
  built-in web UI. It lets you define transfer configurations, schedule jobs
  with cron expressions, monitor transfer history, and manage users and roles —
  all from the browser. It uses rclone under the hood, giving it support for
  dozens of storage backends including S3, SFTP, Google Drive, Azure Blob, local
  paths, and more.
instructions:
  After deployment, open your service URL and log in with the default
  credentials, admin@example.com/admin
changeLog:
  - date: 2026-06-23
    description: Initial release (0.2.11)
links:
  - label: Website
    url: https://starfleetcptn.github.io/GoMFT/
  - label: GitHub
    url: https://github.com/StarFleetCPTN/GoMFT
