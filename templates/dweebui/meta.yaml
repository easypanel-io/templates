name: DweebUI
description:
  DweebUI is a free, open-source web UI for managing Docker and Podman
  containers. It provides a dynamically updating dashboard showing real-time
  CPU, RAM, network, and disk metrics alongside container cards with one-click
  start, stop, pause, restart, log, and detail controls. It also manages images,
  volumes, and networks, supports multi-user access with a permission system,
  includes an app template library compatible with Portainer, and works on
  Windows, Linux, and macOS. Built with Node.js, Express, HTMX, and EJS, the
  entire stack runs in a single container connected to the Docker socket.
instructions:
  Open the app at your domain. On first visit you will be prompted to register
  an admin account — use the SECRET value shown in the service environment
  variables as the registration key. The Docker socket is mounted read-write so
  DweebUI can manage containers. For Podman, replace /var/run/docker.sock with
  /run/podman/podman.sock in the bind mount after deployment.
