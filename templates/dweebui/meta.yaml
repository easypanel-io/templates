schema:
  type: object
  required:
    - appServiceName
    - appServiceImage
  properties:
    appServiceName:
      type: string
      title: App Service Name
      default: dweebui
    appServiceImage:
      type: string
      title: App Service Image
      default: lllllllillllllillll/dweebui:v0.60
benefits:
  - title: Unified Container Dashboard
    description:
      A single-page dashboard shows live CPU, RAM, network, and disk metrics at
      the top and a card for every container below — with status indicators and
      action buttons — all updating without a page reload.
  - title: Multi-User Permission System
    description:
      Create multiple user accounts and assign per-container permissions so team
      members can manage only the containers they are authorised to touch,
      without sharing admin credentials.
  - title: Portainer-Compatible App Templates
    description:
      Import and deploy apps from a built-in template library that uses the same
      format as Portainer, making it easy to migrate or share stacks between
      tools.
features:
  - title: Container Lifecycle Controls
    description:
      Start, stop, pause, restart, and remove containers from the dashboard.
      View real-time logs and inspect container details without a terminal.
  - title: Image, Volume, and Network Management
    description:
      Browse and delete Docker images, volumes, and networks from dedicated tabs
      — no CLI required for routine cleanup tasks.
  - title: Docker and Podman Support
    description:
      Connects to the Docker socket by default; switch to the Podman socket path
      for rootless Podman environments with no other configuration change.
  - title: Light and Dark Mode
    description:
      Toggle between light and dark themes from the UI; the preference is
      persisted per user session.
  - title: Mobile-Friendly Interface
    description:
      The responsive layout scales to phone and tablet screens, making it
      practical to check and control containers from any device.
tags:
  - Docker
  - Container Management
  - Dashboard
  - Self-Hosted
  - DevOps
