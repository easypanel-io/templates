name: Hermes Agent + Workspace
description: |
  Deploys Hermes Agent alongside the Hermes Workspace — a full-featured web dashboard with chat, terminal, file browser, memory editor, and skills browser. The Workspace connects to the agent internally via Docker networking (no public API exposure required), making this the most secure way to run a browser-based Hermes UI. Optionally enable the agent's public API server for external clients like Claude Code or Open WebUI.
instructions: |
  Deploy with Gateway Mode OFF first. SSH into your server and run: docker exec -it $(docker ps --filter name=hermes-agent --format "{{.Names}}" | head -1) /opt/hermes/.venv/bin/hermes setup to configure your API keys and model. The Workspace will be available at its Easypanel domain immediately and connects to the agent over the internal Docker network. Set HERMES_PASSWORD in the Workspace service to protect the UI. The agent's API server (port 8642) is only exposed publicly if you enable it — the Workspace does not require it.
changeLog:
  - date: "2025-04-17"
    description: Initial release
links:
  - label: Hermes Agent
    url: https://hermes-agent.nousresearch.com/
  - label: Hermes Workspace
    url: https://github.com/outsourc-e/hermes-workspace
  - label: Documentation
    url: https://hermes-agent.nousresearch.com/docs
contributors:
  - name: Community
    url: https://github.com/NousResearch/hermes-agent/graphs/contributors
schema:
  type: object
  required:
    - agentServiceName
    - agentServiceImage
    - workspaceServiceName
  properties:
    agentServiceName:
      type: string
      title: Agent Service Name
      default: hermes-agent
    agentServiceImage:
      type: string
      title: Agent Service Image
      default: nousresearch/hermes-agent:latest
    workspaceServiceName:
      type: string
      title: Workspace Service Name
      default: hermes-workspace
    gatewayMode:
      type: boolean
      title: Enable Gateway Mode
      description: "ON: runs hermes gateway run (Telegram/Discord/Slack/cron). OFF: idles so you can SSH in and run hermes setup first."
      default: false
    workspacePassword:
      type: string
      title: Workspace UI Password
      description: "Optional: password to protect the Hermes Workspace browser UI. Leave blank for no password (only safe on private networks)."
    apiServerEnabled:
      type: boolean
      title: Expose Public API Server (port 8642)
      description: "Exposes the agent's OpenAI-compatible API publicly via Easypanel's HTTPS domain. Required for Claude Code, Open WebUI, or Cursor. The Workspace does NOT need this — it uses the internal Docker network."
      default: false
    apiServerKey:
      type: string
      title: API Server Key
      description: "Bearer token for the public API server. Auto-generated if blank. Only relevant when Expose Public API Server is ON."
    anthropicApiKey:
      type: string
      title: Anthropic API Key
      description: "Optional: injected as ANTHROPIC_API_KEY. Can also be set later via hermes setup."
    openaiApiKey:
      type: string
      title: OpenAI API Key
      description: "Optional: injected as OPENAI_API_KEY. Can also be set later via hermes setup."
    telegramBotToken:
      type: string
      title: Telegram Bot Token
      description: "Optional: your Telegram bot token from @BotFather."
    discordBotToken:
      type: string
      title: Discord Bot Token
      description: "Optional: your Discord bot token."
benefits:
  - title: Full Workspace — No Terminal Required
    description: Chat, terminal, file browser, memory editor, and skills browser all in one PWA. Install it to your home screen for a native-app experience on any device.
  - title: Secure Internal Networking
    description: The Workspace talks to the agent over Docker's internal network — no API key exposed to the browser, no public port required for the connection between services.
  - title: Persistent Memory & Skills
    description: The agent remembers conversations, builds skills, and retains context across sessions — all stored in a persistent volume on your server.
  - title: Mobile PWA Support
    description: Install Hermes Workspace to your phone via Safari or Chrome for full feature parity with the desktop — chat, terminal, and memory on the go.
features:
  - title: Real-Time SSE Chat
    description: Streaming agent responses with live tool-call rendering, Markdown highlighting, and multi-session management.
  - title: Terminal Panel
    description: Full PTY terminal with persistent shell sessions and direct workspace file access — all from the browser.
  - title: File Browser
    description: Navigate, preview, and edit workspace files with Monaco editor integration and directory tree navigation.
  - title: Memory & Skills Browser
    description: Browse and edit agent memory files, search across entries, and explore 2,000+ skills from the registry.
  - title: 8-Theme System
    description: Official, Classic, Slate, and Mono — each with light and dark variants. Theme persists across sessions.
  - title: Security Hardened
    description: Auth middleware on all API routes, CSP headers, path traversal prevention, rate limiting, and optional UI password protection.
tags:
  - AI
  - Automation
  - Self-Hosted
  - Developer Tools
  - Productivity
