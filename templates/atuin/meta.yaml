name: Atuin
description:
  Atuin is an open-source, self-hosted shell history sync server that replaces
  your traditional shell history with a SQLite-backed store and synchronises it
  end-to-end encrypted across all your machines. Every command is recorded with
  rich metadata — exit code, duration, working directory, hostname, and session
  — so you can fuzzy-search and filter your entire history from any device. The
  sync server never sees your plaintext data; all encryption and decryption
  happens on the client. This template deploys the Atuin sync server backed by
  PostgreSQL, ready to accept registrations from the Atuin CLI clients on your
  machines.
instructions:
  After deployment, configure the Atuin CLI on each machine by running "atuin
  register -u <username> -e <email> -p <password> --server
  https://<your-domain>" (or "atuin login" if you already have an account). The
  sync server listens on port 8888. ATUIN_OPEN_REGISTRATION is set to true by
  default — once you have registered all accounts you want to allow, set it to
  false and redeploy the app service to prevent new signups.
