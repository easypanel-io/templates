name: Convert
description:
  Convert is a truly universal, privacy-focused online file converter that runs
  entirely in your browser. Unlike traditional converters that upload your files
  to a remote server, Convert processes everything locally — no data ever leaves
  your machine. It supports conversion across vastly different media types, for
  example turning a video into a PDF, going far beyond the same-medium limits of
  most tools. Built on Bun, Vite, and a modular handler architecture, it is
  lightweight, extensible, and free of any third-party data collection.
instructions:
  After deployment navigate to your app domain — you will be automatically
  redirected to /convert/. Click the blue box (or drag-and-drop) to load a file,
  choose an output format, and click Convert. No login or account is required.
changeLog:
  - date: 2026-06-02
    description: Initial Template Release
