      default: convert
    appServiceImage:
      type: string
      title: App Service Image
      default: ghcr.io/p2r3/convert:latest
      description: Convert Docker image from GitHub Container Registry
benefits:
  - title: Complete Privacy
    description:
      All file conversion happens inside your browser — nothing is ever uploaded
      to an external server, keeping your documents, media, and data private.
  - title: Truly Universal Conversion
    description:
      Convert between formats that no other tool supports, including
      cross-medium conversions like video to PDF, breaking the same-medium
      barrier of conventional converters.
  - title: Zero Configuration
    description:
      No accounts, API keys, or complex setup required. Deploy once and convert
      files instantly from any modern browser.
  - title: Self-Hosted Control
    description:
      Host your own instance on your infrastructure so you decide who can access
      it and never depend on a third-party service going down or changing terms.
features:
  - title: Cross-Medium Conversion
    description:
      Convert files across completely different media types — images, video,
      audio, documents, and more — in combinations most tools do not support.
  - title: Drag-and-Drop Interface
    description:
      Simple, clean UI with drag-and-drop file loading and automatic input
      format detection to minimise the steps needed before converting.
  - title: Modular Handler Architecture
    description:
      Each conversion tool is a self-contained handler, making it easy to extend
      the supported format list without touching core logic.
  - title: Format Cache
    description:
      A pre-built format cache ships with the Docker image so the list of
      supported conversions loads instantly without a slow build step on first
      visit.
  - title: Client-Side Processing
    description:
      Powered by WebAssembly and browser APIs, conversions run directly in the
      visitor's browser, eliminating server-side processing costs and latency.
  - title: GPL-2.0 Licensed
    description:
      Fully open-source under GPL-2.0 — inspect, modify, and redistribute the
      code freely in accordance with the licence terms.
tags:
